<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Chess</title>

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/chessboard.js/1.0.0/chessboard-1.0.0.min.css">

<style>
body{
text-align:center;
font-family:Arial;
}

#board{
width:350px;
margin:20px auto;
}
</style>
</head>

<body>

<h1>♟️ Chess</h1>

<div id="board"></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/chess.js/0.10.3/chess.min.js"></script>

<script src="https://cdnjs.cloudflare.com/ajax/libs/chessboard.js/1.0.0/chessboard-1.0.0.min.js"></script>

<script>
var game = new Chess();

var board = Chessboard('board', {
draggable: true,
position: 'start',

onDrop: function(source, target) {

var move = game.move({
from: source,
to: target,
promotion: 'q'
});

if(move === null)
return 'snapback';
}
});
</script>

</body>
</html>
